# 机场订阅（可添加多个，格式参考 Airport1）
proxy-providers:
  ss1:
    url: "ss1"
    type: http
    path: /etc/openclash/proxy_provider/ssconfig1.yaml
    interval: 86400
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
      lazy: true
    proxy: 直连
  ss2:
    url: "ss2"
    type: http
    path: /etc/openclash/proxy_provider/ssconfig2.yaml
    interval: 86400
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
      lazy: true
    proxy: 直连

# 节点信息
proxies:
  - {name: 直连, type: direct}

# 全局配置
# OpenClash 会接管端口和流量转发，mixed-port 保留供其读取，其余由 OpenClash 覆写
# port: 7890
# socks-port: 7891
# redir-port: 7892
mixed-port: 7893
# tproxy-port: 7894
allow-lan: true
bind-address: "*"
ipv6: false
unified-delay: true
tcp-concurrent: true
# 裸核模式下关闭进程匹配
# OpenClash 运行在路由器上，无法按进程分流，设为 off 节省资源
# find-process-mode: strict
find-process-mode: off
log-level: warning
global-client-fingerprint: chrome
keep-alive-idle: 600
keep-alive-interval: 15
profile:
  store-selected: true
  store-fake-ip: true

# 控制面板由 OpenClash 自行注入，此处无需配置
#external-controller: 0.0.0.0:9090
#secret: ""
#external-ui: ui
#external-ui-name: zashboard
#external-ui-url: "https://github.com/Zephyruso/zashboard/archive/refs/heads/gh-pages.zip"

# 嗅探
sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
  force-domain:
    - "+.v2ex.com"
  skip-domain:
    - "rule-set:private_domain,cn_domain"
    - "+.apple.com"
    - "+.icloud.com"
    - "+.wechat.com"
    - "+.weixin.qq.com"
    - "+.qq.com"
    - "+.wechatapp.com"
    - "Mijia Cloud"
    - "+.push.apple.com"
    - "+.msftconnecttest.com"
    - "+.msftncsi.com"

# 入站
tun:
  enable: true
  # system/gvisor/mixed
  stack: mixed
  dns-hijack: ["any:53", "tcp://any:53"]
  # ---- 裸核模式（不使用 nikki 等外部工具）----
  # auto-route: true
  # auto-redirect: true
  # auto-detect-interface: true
  # ---- nikki/旁路由模式（外部已接管路由）----
  auto-route: false
  auto-redirect: false
  auto-detect-interface: false
  #device: nikki

# DNS 模块
# OpenClash 会劫持局域网 DNS 请求并转发到此处（默认 1053 端口）
dns:
  enable: true
  cache-algorithm: arc
  listen: 0.0.0.0:1053
  ipv6: false
  prefer-h3: false
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter-mode: blacklist
  fake-ip-filter:
    - "rule-set:fakeipfilter_domain"
  # 用于解析 DoH/DoT 类 nameserver 的域名，必须为 IP 格式
  default-nameserver:
    - 223.5.5.5 # 阿里 DNS，最推荐，全国速度最稳
    - 119.29.29.29 # 腾讯 DNS，备选
  # 解析代理节点域名，用国内 DNS 确保节点连得上
  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  # 直连流量专用 DNS
  direct-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  direct-nameserver-follow-policy: false
  # 走代理的域名使用境外 DoH，防止污染和泄露
  nameserver:
    - https://cloudflare-dns.com/dns-query
    - https://dns.google/dns-query
  nameserver-policy:
    # 国内域名 + 私有域名 → 国内 DNS
    "rule-set:private_domain,cn_domain":
      - https://dns.alidns.com/dns-query
      - https://doh.pub/dns-query
    # 明确走代理的域名 → 境外 DoH
    "rule-set:ai,gfw_domain,geolocation-!cn":
      - https://cloudflare-dns.com/dns-query
      - https://dns.google/dns-query

